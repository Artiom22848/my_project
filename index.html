<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр методов</title>
    <style>
        /* Убираем все отступы, чтобы файл был на весь экран */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #525659; /* Цвет фона как в читалках */
        }
        /* Растягиваем контейнер с PDF */
        object, embed, iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
<object data="project.pdf" type="application/pdf">
        <embed src="project.pdf" type="application/pdf" />
        <p>Ваш браузер не поддерживает просмотр PDF. 
           <a href="project.pdf">Скачайте файл</a>, чтобы просмотреть его.
        </p>
    </object>

</body>
</html>
